<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>روابطي - صفحة الروابط</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --card: rgba(255,255,255,0.04);
    --card-hover: rgba(255,255,255,0.09);
    --border: rgba(255,255,255,0.08);
    --border-hover: rgba(255,255,255,0.22);
    --text: #f0eeff;
    --muted: rgba(240,238,255,0.45);
    --accent1: #7c5cfc;
    --accent2: #fc5c8a;
    --accent3: #5cf4fc;
    --glow1: rgba(124,92,252,0.35);
    --glow2: rgba(252,92,138,0.25);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Cairo', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 20px 80px;
    position: relative;
    overflow-x: hidden;
  }

  /* Animated background */
  body::before {
    content: '';
    position: fixed;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background:
      radial-gradient(ellipse 60% 40% at 20% 20%, rgba(124,92,252,0.18) 0%, transparent 60%),
      radial-gradient(ellipse 50% 35% at 80% 80%, rgba(252,92,138,0.14) 0%, transparent 55%),
      radial-gradient(ellipse 40% 30% at 60% 10%, rgba(92,244,252,0.10) 0%, transparent 50%);
    animation: bgMove 12s ease-in-out infinite alternate;
    pointer-events: none;
    z-index: 0;
  }

  @keyframes bgMove {
    0% { transform: translate(0,0) rotate(0deg); }
    100% { transform: translate(2%, 2%) rotate(3deg); }
  }

  /* Noise grain overlay */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 1;
    opacity: 0.5;
  }

  .container {
    position: relative;
    z-index: 2;
    width: 100%;
    max-width: 480px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
  }

  /* Profile section */
  .profile {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
    margin-bottom: 36px;
    opacity: 0;
    transform: translateY(-20px);
    animation: fadeDown 0.7s ease forwards 0.1s;
  }

  @keyframes fadeDown {
    to { opacity: 1; transform: translateY(0); }
  }

  .avatar-wrap {
    position: relative;
    width: 96px;
    height: 96px;
  }

  .avatar-ring {
    position: absolute;
    inset: -4px;
    border-radius: 50%;
    background: conic-gradient(from 0deg, var(--accent1), var(--accent2), var(--accent3), var(--accent1));
    animation: spin 4s linear infinite;
    filter: blur(1px);
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  .avatar {
    position: relative;
    width: 96px;
    height: 96px;
    border-radius: 50%;
    background: linear-gradient(135deg, #1a1a2e, #16213e);
    border: 3px solid var(--bg);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 38px;
    z-index: 1;
    overflow: hidden;
    cursor: pointer;
  }

  .avatar img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: 50%;
    display: none;
  }

  .avatar-emoji { font-size: 42px; line-height: 1; }

  .profile-name {
    font-size: 24px;
    font-weight: 900;
    letter-spacing: -0.5px;
    background: linear-gradient(135deg, #fff 0%, rgba(255,255,255,0.7) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    text-align: center;
  }

  .profile-bio {
    font-size: 14px;
    color: var(--muted);
    text-align: center;
    line-height: 1.6;
    max-width: 300px;
    font-weight: 300;
  }

  .profile-badge {
    display: flex;
    align-items: center;
    gap: 6px;
    background: rgba(124,92,252,0.15);
    border: 1px solid rgba(124,92,252,0.3);
    border-radius: 20px;
    padding: 4px 14px;
    font-size: 12px;
    color: rgba(200,190,255,0.9);
    font-weight: 600;
  }

  /* Edit mode toggle */
  .edit-btn {
    position: fixed;
    top: 20px;
    left: 20px;
    z-index: 100;
    background: rgba(255,255,255,0.06);
    border: 1px solid var(--border);
    border-radius: 12px;
    color: var(--muted);
    padding: 8px 16px;
    font-family: 'Cairo', sans-serif;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
    backdrop-filter: blur(10px);
  }

  .edit-btn:hover {
    background: rgba(255,255,255,0.1);
    color: var(--text);
    border-color: var(--border-hover);
  }

  .edit-btn.active {
    background: rgba(124,92,252,0.2);
    border-color: rgba(124,92,252,0.5);
    color: rgba(200,190,255,1);
  }

  /* Section header */
  .section-label {
    width: 100%;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 12px;
    margin-top: 8px;
    padding: 0 4px;
    opacity: 0;
    animation: fadeIn 0.5s ease forwards 0.5s;
  }

  @keyframes fadeIn {
    to { opacity: 1; }
  }

  /* Link cards */
  .links-list {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .link-card {
    width: 100%;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 14px 18px;
    display: flex;
    align-items: center;
    gap: 14px;
    text-decoration: none;
    color: var(--text);
    cursor: pointer;
    transition: all 0.25s cubic-bezier(0.4,0,0.2,1);
    position: relative;
    overflow: hidden;
    opacity: 0;
    transform: translateY(15px);
    animation: cardIn 0.5s ease forwards;
    backdrop-filter: blur(8px);
  }

  .link-card::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 16px;
    opacity: 0;
    transition: opacity 0.25s;
  }

  .link-card:hover {
    background: var(--card-hover);
    border-color: var(--border-hover);
    transform: translateY(-2px) scale(1.01);
    box-shadow: 0 12px 40px rgba(0,0,0,0.4), 0 0 0 1px rgba(255,255,255,0.05);
  }

  .link-card:hover::before {
    opacity: 1;
  }

  .link-card:active {
    transform: scale(0.98);
  }

  @keyframes cardIn {
    to { opacity: 1; transform: translateY(0); }
  }

  .link-icon {
    width: 44px;
    height: 44px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    flex-shrink: 0;
    position: relative;
    overflow: hidden;
  }

  .link-icon svg {
    width: 24px;
    height: 24px;
    fill: white;
    position: relative;
    z-index: 1;
  }

  .link-info {
    flex: 1;
    min-width: 0;
  }

  .link-title {
    font-size: 15px;
    font-weight: 700;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .link-url {
    font-size: 12px;
    color: var(--muted);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-top: 2px;
    font-weight: 300;
  }

  .link-arrow {
    color: var(--muted);
    font-size: 18px;
    flex-shrink: 0;
    transition: transform 0.2s, color 0.2s;
  }

  .link-card:hover .link-arrow {
    transform: translateX(-4px);
    color: var(--text);
  }

  /* Edit controls on card */
  .card-edit-controls {
    display: none;
    gap: 6px;
    flex-shrink: 0;
  }

  .edit-mode .card-edit-controls { display: flex; }
  .edit-mode .link-arrow { display: none; }
  .edit-mode .link-card { cursor: default; }
  .edit-mode .link-card:hover { transform: none; box-shadow: none; }

  .ctrl-btn {
    width: 30px;
    height: 30px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: rgba(255,255,255,0.05);
    color: var(--muted);
    font-size: 14px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    font-family: 'Cairo';
  }

  .ctrl-btn:hover { background: rgba(255,255,255,0.1); color: var(--text); }
  .ctrl-btn.del:hover { background: rgba(252,92,138,0.15); border-color: rgba(252,92,138,0.4); color: #fc5c8a; }

  /* Add link form */
  .add-form {
    width: 100%;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 20px;
    margin-top: 12px;
    display: none;
    flex-direction: column;
    gap: 12px;
    backdrop-filter: blur(8px);
    animation: fadeIn 0.3s ease;
  }

  .add-form.visible { display: flex; }

  .form-title {
    font-size: 14px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 4px;
  }

  .form-row {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .form-label {
    font-size: 12px;
    color: var(--muted);
    font-weight: 600;
  }

  .form-input {
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 14px;
    color: var(--text);
    font-family: 'Cairo';
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
    width: 100%;
    direction: rtl;
  }

  .form-input:focus { border-color: rgba(124,92,252,0.5); }
  .form-input::placeholder { color: var(--muted); }

  .platform-picker {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .platform-option {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 6px 12px;
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    border-radius: 10px;
    cursor: pointer;
    font-size: 13px;
    color: var(--muted);
    transition: all 0.2s;
    font-family: 'Cairo';
  }

  .platform-option:hover,
  .platform-option.selected {
    background: rgba(124,92,252,0.15);
    border-color: rgba(124,92,252,0.4);
    color: var(--text);
  }

  .form-actions {
    display: flex;
    gap: 8px;
    justify-content: flex-end;
  }

  .btn-save {
    background: linear-gradient(135deg, var(--accent1), var(--accent2));
    border: none;
    border-radius: 10px;
    padding: 10px 22px;
    color: white;
    font-family: 'Cairo';
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.2s;
  }

  .btn-save:hover { opacity: 0.9; transform: scale(1.02); }

  .btn-cancel {
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 18px;
    color: var(--muted);
    font-family: 'Cairo';
    font-size: 14px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-cancel:hover { background: rgba(255,255,255,0.1); color: var(--text); }

  /* Add new link button */
  .add-link-btn {
    width: 100%;
    background: transparent;
    border: 2px dashed rgba(255,255,255,0.12);
    border-radius: 16px;
    padding: 14px;
    color: var(--muted);
    font-family: 'Cairo';
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.25s;
    margin-top: 6px;
    display: none;
    align-items: center;
    justify-content: center;
    gap: 8px;
    letter-spacing: 0.3px;
  }

  .add-link-btn:hover {
    border-color: rgba(124,92,252,0.5);
    color: rgba(180,170,255,0.9);
    background: rgba(124,92,252,0.06);
  }

  .edit-mode .add-link-btn { display: flex; }

  /* Profile edit */
  .profile-edit {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    width: 100%;
    margin-bottom: 20px;
  }

  .edit-mode .profile-edit { display: flex; }
  .edit-mode .profile { display: none; }

  .profile-edit-card {
    width: 100%;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    backdrop-filter: blur(8px);
  }

  /* Stats bar */
  .stats-bar {
    display: flex;
    gap: 0;
    width: 100%;
    margin-top: 16px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
    opacity: 0;
    animation: fadeIn 0.5s ease forwards 0.9s;
  }

  .stat-item {
    flex: 1;
    padding: 14px 10px;
    text-align: center;
    border-left: 1px solid var(--border);
    position: relative;
  }

  .stat-item:last-child { border-left: none; }

  .stat-value {
    font-size: 20px;
    font-weight: 900;
    color: var(--text);
    line-height: 1;
    margin-bottom: 4px;
  }

  .stat-label {
    font-size: 11px;
    color: var(--muted);
    font-weight: 400;
  }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: rgba(30,30,40,0.95);
    border: 1px solid var(--border-hover);
    border-radius: 14px;
    padding: 12px 24px;
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
    z-index: 1000;
    transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1);
    backdrop-filter: blur(20px);
    white-space: nowrap;
  }

  .toast.show { transform: translateX(-50%) translateY(0); }

  /* Footer */
  .footer {
    margin-top: 36px;
    text-align: center;
    font-size: 12px;
    color: rgba(255,255,255,0.2);
    opacity: 0;
    animation: fadeIn 0.5s ease forwards 1.2s;
  }

  /* Responsive */
  @media (max-width: 480px) {
    body { padding: 30px 16px 60px; }
    .profile-name { font-size: 20px; }
    .edit-btn { padding: 6px 12px; font-size: 12px; }
  }
</style>
</head>

const PLATFORMS = {
  instagram: { color: 'linear-gradient(135deg,#f09433,#e6683c,#dc2743,#cc2366,#bc1888)', label: 'إنستغرام', icon: '📸' },
  tiktok:    { color: 'linear-gradient(135deg,#010101,#69C9D0)', label: 'تيك توك', icon: '🎵' },
  twitter:   { color: 'linear-gradient(135deg,#1DA1F2,#0d7cbd)', label: 'تويتر / X', icon: '🐦' },
  youtube:   { color: 'linear-gradient(135deg,#FF0000,#cc0000)', label: 'يوتيوب', icon: '▶️' },
  facebook:  { color: 'linear-gradient(135deg,#1877F2,#0d5fc0)', label: 'فيسبوك', icon: '📘' },
  whatsapp:  { color: 'linear-gradient(135deg,#25D366,#128C7E)', label: 'واتساب', icon: '💬' },
  telegram:  { color: 'linear-gradient(135deg,#0088cc,#005fa3)', label: 'تيليغرام', icon: '✈️' },
  snapchat:  { color: 'linear-gradient(135deg,#FFFC00,#e6e300)', label: 'سناب شات', icon: '👻' },
  linkedin:  { color: 'linear-gradient(135deg,#0077B5,#005582)', label: 'لينكدإن', icon: '💼' },
  website:   { color: 'linear-gradient(135deg,#7c5cfc,#fc5c8a)', label: 'موقع', icon: '🌐' },
  other:     { color: 'linear-gradient(135deg,#444,#666)', label: 'رابط', icon: '🔗' }
};

const DEFAULT_LINKS = [
  { title: 'فيسبوك', url: 'https://www.facebook.com/share/1bT51i2XoF/', platform: 'facebook' },
  { title: 'إنستغرام', url: 'https://www.instagram.com/samaalandules', platform: 'instagram' },
  { title: 'تيك توك', url: 'https://www.tiktok.com/@sama.alandules.pharmacy', platform: 'tiktok' },
  { title: 'واتساب', url: 'https://wa.me/00218919221822', platform: 'whatsapp' },
];

let data = JSON.parse(localStorage.getItem('linktree_data') || '{}');
if (!data.name) data.name = 'صيدلية سما الأندلس';
if (!data.bio) data.bio = 'مرحبا بكم في صفحة صيدليات سما الأندلس 👋 تابعونا للحصول على نصائح طبية 💊 مع تمنياتنا لكم بدوام الصحة والعافية 🌿';
if (!data.emoji) data.emoji = '🌟';
if (!data.links || data.links.length === 0) data.links = DEFAULT_LINKS;
if (!data.clicks) data.clicks = 0;

let selectedPlatform = 'other';
let isEditMode = false;

function save() {
  localStorage.setItem('linktree_data', JSON.stringify(data));
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function updateProfile() {
  document.getElementById('nameDisplay').textContent = data.name;
  document.getElementById('bioDisplay').textContent = data.bio;
  const emojiEl = document.getElementById('avatarEmoji'); if(emojiEl) emojiEl.textContent = data.emoji;
  document.getElementById('statLinks').textContent = data.links.length;
  document.getElementById('statClicks').textContent = data.clicks;
}

function renderLinks() {
  const list = document.getElementById('linksList');
  list.innerHTML = '';
  data.links.forEach((link, i) => {
    const p = PLATFORMS[link.platform] || PLATFORMS.other;
    const delay = 0.3 + i * 0.07;
    const card = document.createElement('div');
    card.className = 'link-card';
    card.style.animationDelay = `${delay}s`;
    card.dataset.index = i;

    card.innerHTML = `
      <div class="link-icon" style="background:${p.color}">
        ${PLATFORM_SVGS[link.platform] || PLATFORM_SVGS.other}
      </div>
      <div class="link-info">
        <div class="link-title">${link.title}</div>
        <div class="link-url">${link.url}</div>
      </div>
      <div class="card-edit-controls">
        <button class="ctrl-btn" onclick="moveUp(${i})" title="أعلى">↑</button>
        <button class="ctrl-btn" onclick="moveDown(${i})" title="أسفل">↓</button>
        <button class="ctrl-btn del" onclick="deleteLink(${i})" title="حذف">✕</button>
      </div>
      <div class="link-arrow">←</div>
    `;

    // Click handler (open link if not edit mode)
    card.addEventListener('click', (e) => {
      if (isEditMode) return;
      if (!e.target.closest('.ctrl-btn')) {
        data.clicks++;
        save();
        document.getElementById('statClicks').textContent = data.clicks;
        let url = link.url;
        if (!url.startsWith('http')) url = 'https://' + url;
        window.open(url, '_blank');
      }
    });

    list.appendChild(card);
  });

  if (data.links.length === 0 && !isEditMode) {
    list.innerHTML = `<div style="text-align:center;color:var(--muted);padding:32px;font-size:14px;border:1px dashed rgba(255,255,255,0.08);border-radius:16px;">
      لا توجد روابط بعد<br><span style="font-size:11px;opacity:0.6;">فعّل وضع التعديل لإضافة روابطك</span>
    </div>`;
  }

  updateProfile();
}

function toggleEdit() {
  isEditMode = !isEditMode;
  const btn = document.getElementById('editBtn');
  const container = document.getElementById('mainContainer');

  if (isEditMode) {
    btn.textContent = '✅ إنهاء التعديل';
    btn.classList.add('active');
    container.classList.add('edit-mode');
    document.getElementById('editName').value = data.name;
    document.getElementById('editBio').value = data.bio;
    document.getElementById('editEmoji').value = data.emoji;
  } else {
    btn.textContent = '✏️ تعديل';
    btn.classList.remove('active');
    container.classList.remove('edit-mode');
    hideAddForm();
  }

  renderLinks();
}

function saveProfile() {
  const name = document.getElementById('editName').value.trim();
  const bio = document.getElementById('editBio').value.trim();
  const emoji = document.getElementById('editEmoji').value.trim();

  if (name) data.name = name;
  if (bio) data.bio = bio;
  if (emoji) data.emoji = emoji;

  save();
  updateProfile();
  showToast('✅ تم حفظ الملف الشخصي');
}

function selectPlatform(el) {
  document.querySelectorAll('.platform-option').forEach(b => b.classList.remove('selected'));
  el.classList.add('selected');
  selectedPlatform = el.dataset.platform;

  const p = PLATFORMS[selectedPlatform];
  if (!document.getElementById('newTitle').value) {
    document.getElementById('newTitle').value = p.label;
  }
}

function showAddForm() {
  document.getElementById('addForm').classList.add('visible');
  document.getElementById('addLinkBtn').style.display = 'none';
  document.getElementById('newTitle').value = '';
  document.getElementById('newUrl').value = '';
  selectedPlatform = 'other';
  document.querySelectorAll('.platform-option').forEach(b => b.classList.remove('selected'));
}

function hideAddForm() {
  document.getElementById('addForm').classList.remove('visible');
  document.getElementById('addLinkBtn').style.display = 'flex';
}

function addLink() {
  const title = document.getElementById('newTitle').value.trim();
  const url = document.getElementById('newUrl').value.trim();

  if (!title) { showToast('⚠️ الرجاء إدخال اسم الرابط'); return; }
  if (!url) { showToast('⚠️ الرجاء إدخال الرابط'); return; }

  data.links.push({ title, url, platform: selectedPlatform });
  save();
  hideAddForm();
  renderLinks();
  showToast('✅ تم إضافة الرابط بنجاح!');
}

function deleteLink(i) {
  if (!confirm('هل تريد حذف هذا الرابط؟')) return;
  data.links.splice(i, 1);
  save();
  renderLinks();
  showToast('🗑️ تم حذف الرابط');
}

function moveUp(i) {
  if (i === 0) return;
  [data.links[i-1], data.links[i]] = [data.links[i], data.links[i-1]];
  save(); renderLinks();
}

function moveDown(i) {
  if (i === data.links.length - 1) return;
  [data.links[i+1], data.links[i]] = [data.links[i], data.links[i+1]];
  save(); renderLinks();
}

// Init
renderLinks();
</script>
</body>
</html>
